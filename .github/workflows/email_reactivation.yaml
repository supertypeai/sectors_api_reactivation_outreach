name: Trigger Email Reactivation API

on:
  schedule:
    - cron: "0 3 * * *" # 10 AM WIB
  workflow_dispatch:

jobs:
  trigger_workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Call Email Reactivation API, Save Response & Log
        run: |
          # Get the current timestamp
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          # Define filenames for the API response and log
          RESPONSE_FILE="api_response_${TIMESTAMP}.json"
          LOG_FILE="api_log_${TIMESTAMP}.log"
          # Call the API and save its response; log output using tee
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "X-Secret-Key: ${{ secrets.ACTION_SECRET_KEY }}" \
            https://api.sectors.app/auth/email-reactivation/ \
            -o "$RESPONSE_FILE" | tee "$LOG_FILE"
          echo "Saved API response to $RESPONSE_FILE and log to $LOG_FILE"

      - name: Upload API Response Artifact
        uses: actions/upload-artifact@v3
        with:
          name: api-response
          path: api_response_*.json

      - name: Upload API Log Artifact
        uses: actions/upload-artifact@v3
        with:
          name: api-log
          path: api_log_*.log
