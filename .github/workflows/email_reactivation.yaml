name: Trigger Email Reactivation API

on:
  schedule:
    - cron: "0 3 * * *" # 10 AM WIB
  workflow_dispatch:

jobs:
  trigger_workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Call Email Reactivation API & Save Response
        env:
          ACTION_SECRET_KEY: ${{ secrets.ACTION_SECRET_KEY }}
        run: |
          # Get the current timestamp
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          # Define filename for the API response
          RESPONSE_FILE="api_response_${TIMESTAMP}.json"
          # Call the API and save its response
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "X-Secret-Key: $ACTION_SECRET_KEY" \
            https://api.sectors.app/auth/email-reactivation/ \
            -o "$RESPONSE_FILE"
          echo "Saved API response to $RESPONSE_FILE"

      - name: Upload API Response Artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: api-response
          path: api_response_*.json
