name: Trigger Email Reactivation API

on:
  schedule:
    # Run every day at midnight UTC (adjust as needed)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call Email Reactivation API
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "X-Secret-Key: ${{ secrets.ACTION_SECRET_KEY }}" \
            http://127.0.0.1:8000/auth/api/email-reactivation-test/