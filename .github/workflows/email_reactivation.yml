name: Trigger Email Reactivation API

on:
  schedule:
    - cron: "0 3 * * *" # 10 AM WIB
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Call Email Reactivation API and Save Response
        run: |
          # Get the current timestamp
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          # Create a filename that includes the timestamp
          FILENAME="api_response_${TIMESTAMP}.json"
          # Call the API and save its response to the file
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "X-Secret-Key: ${{ secrets.ACTION_SECRET_KEY }}" \
            https://api.sectors.app/auth/api/email-reactivation/ \
            -o "$FILENAME"
          echo "Saved API response to $FILENAME"

      - name: Upload API Response Artifact
        uses: actions/upload-artifact@v3.1.2
        with:
          name: api-response
          path: api_response_*.json
